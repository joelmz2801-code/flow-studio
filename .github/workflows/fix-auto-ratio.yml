name: Fix smart auto ratio

on:
  push:
    paths:
      - .github/workflows/fix-auto-ratio.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Patch ChatPage auto ratio logic
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/ChatPage.jsx')
          source = path.read_text()

          start = source.index(' // Auto 模式智能画幅：按 prompt 关键词决定比例')
          end = source.index('\n\n const send = async', start)
          replacement = ''' // Auto 模式智能画幅：先尊重明确比例，再按主体、构图和投放场景判断。
 // 无明确线索时使用更通用的 4:3，不再悄悄退回 1:1。
 const detectAutoRatio = (text) => {
 const t = (text || '').toLowerCase()
 const pick = (id) => RATIOS.find((r) => r.id === id)

 // 用户明确写出的比例优先级最高
 const explicit = t.match(/(?:^|\\s)(16:9|9:16|4:3|3:4|2:3|1:1)(?:$|\\s|，|,|。)/)?.[1]
 if (explicit) return pick(explicit)

 // 明确的发布载体和纵向构图
 if (/(短视频|手机壁纸|竖屏|reels?|stories?|tiktok|小红书竖图|vertical video)/i.test(t)) return pick('9:16')
 if (/(海报|电影海报|宣传海报|全身像|全身照|杂志封面|poster|full[- ]?body|editorial cover)/i.test(t)) return pick('2:3')
 if (/(竖幅|半身像|时装模特|穿搭|portrait photo|fashion portrait|standing portrait)/i.test(t)) return pick('3:4')

 // 人像默认给 4:3，兼顾人物主体与环境；头像、图标等明确方形内容除外
 if (/(头像|证件照|icon|图标|logo|徽标|avatar|profile picture|sticker|贴纸)/i.test(t)) return pick('1:1')
 if (/(人像|人物|肖像|脸部|人脸|特写|半身|情侣|合照|家庭照|portrait|headshot|close[- ]?up|people|person|model)/i.test(t)) return pick('4:3')

 // 场景和叙事画面使用宽幅
 if (/(全景|宽屏|电影感|电影画面|视频封面|横幅|电脑壁纸|风景|山川|草原|大海|城市天际线|panorama|panoramic|cinematic|banner|landscape|wide shot|wallpaper)/i.test(t)) return pick('16:9')

 // 产品、食物、室内、建筑等常见摄影构图使用 4:3
 if (/(产品|静物|美食|菜品|室内|建筑|街景|店铺|电商|product|still life|food|interior|architecture)/i.test(t)) return pick('4:3')

 return pick('4:3')
 }'''
          source = source[:start] + replacement + source[end:]

          old_ratio = "ratio: ratio.id === 'auto' ? null : { w: ratio.w, h: ratio.h }, time: Date.now(),"
          new_ratio = "ratio: { w: effectiveRatio.w, h: effectiveRatio.h }, time: Date.now(),"
          if old_ratio not in source:
              raise SystemExit('assistant ratio assignment not found')
          source = source.replace(old_ratio, new_ratio, 1)

          old_size = "size: effectiveRatio.id === 'auto' ? sizeForRatio(effectiveRatio.w, effectiveRatio.h) : sizeForRatio(ratio.w, ratio.h)"
          new_size = "size: sizeForRatio(effectiveRatio.w, effectiveRatio.h)"
          if old_size not in source:
              raise SystemExit('image size assignment not found')
          source = source.replace(old_size, new_size, 1)

          path.write_text(source)
      - name: Commit fix
        run: |
          git config user.name "joelting02-sys"
          git config user.email "joelting02@gmail.com"
          git add src/ChatPage.jsx
          git commit -m "fix(chat): make Auto aspect ratio genuinely adaptive [skip ci]"
          git push origin main
